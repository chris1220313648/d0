# Fractal (Franka) RLDS -> Motus-style converter config
#len 84371
# Source Fractal RLDS root.
# The script auto-resolves builder directory (supports source_root/0.1.0 layout).
source_root: "/data/user/wsong890/user68/data/oxe/data/fractal20220817_data"

# Output root.
output_root: "/data/user/wsong890/user68/cjy/Motus/data/fractal/fractal_dataset"

# WAN T5 repo path. Must contain:
#   models_t5_umt5-xxl-enc-bf16.pth
#   google/umt5-xxl
wan_repo_path: "/data/user/wsong890/user68/cjy/Motus/pretrained_models/Wan2.2-TI2V-5B"
t5_max_length: 512
t5_device: "auto"  # auto -> cuda:0 if available; current WAN T5 converter requires CUDA
generate_epos: true
epos_dir_name: "epos"

# Conversion controls
fps: 10
max_episodes_per_split: 0   # 0 = all episodes in split
num_workers: 1              # Reserved for future parallelization
skip_existing: true
overwrite: false

# Task naming / grouping
# exact_instruction: use raw instruction text as grouping key
# normalized_instruction: coarse grouping (Bridge-style)
task_grouping: "exact_instruction"
task_slug_max_len: 80
unknown_task_name: "unknown_task"

# Split export policy (locked to train by default)
splits: ["train"]

# TensorFlow only reads TFDS data here; keep it off GPU by default
# so PyTorch can use GPU memory for WAN T5 encoder.
tf_disable_gpu: true

# Skip noisy/non-task instructions
skip_invalid_instruction: true
invalid_instruction_patterns:
  - "video frame is not showing"
  - "frame is not showing"
  - "camera is not showing"
  - "image is not showing"
  - "nan"
  - "none"
  - "null"

# Logging frequency
log_every_n: 50
