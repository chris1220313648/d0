common:
  # Use the largest robot dimension; 7-D datasets are padded and masked.
  action_dim: 14
  state_dim: 14

  # Shared video settings
  num_video_frames: 8
  video_height: 384
  video_width: 320

  # Default sampling settings. Individual datasets can override global_downsample_rate.
  global_downsample_rate: 1
  video_action_freq_ratio: 2

# Dataset configuration
dataset:
  type: "multi"
  sampling: "weighted"
  target_action_dim: 14
  target_state_dim: 14
  datasets:
    - name: "bridge"
      type: "bridge"
      weight: 1.0
      dataset_dir: "/data/user/wsong890/user68/cjy/Motus/data/bridge/bridge_dataset"
      data_mode: "both"
      task_mode: "multi"
      task_name: null
      max_episodes: null
      image_aug: false
      use_language_action: true
      enable_setup_control_suffix: false
      setup_text: "bimanual yam robotic arms in molmoact2"
      normalize_actions: true
      stats_key: "bridge"
      state_stats_signal: "qpos"
      action_stats_signal: "epos"
      common:
        global_downsample_rate: 1

    - name: "droid"
      type: "droid"
      weight: 1.0
      dataset_dir: "/data/user/wsong890/user68/cjy/Motus/data/droid/droid_dataset"
      data_mode: "both"
      task_mode: "multi"
      task_name: null
      max_episodes: null
      image_aug: false
      use_language_action: true
      enable_setup_control_suffix: false
      setup_text: "bimanual yam robotic arms in molmoact2"
      normalize_actions: true
      stats_key: "droid"
      state_stats_signal: "qpos"
      action_stats_signal: "epos"
      common:
        global_downsample_rate: 2

    - name: "robotwin"
      type: "robotwin"
      weight: 1.0
      dataset_dir: "/data/user/wsong890/user68/cjy/Motus/data/robotwin_dataset"
      data_mode: "both"
      task_mode: "multi"
      task_name: null
      max_episodes: null
      image_aug: false
      use_language_action: true
      common:
        global_downsample_rate: 3

    - name: "fractal"
      type: "fractal_bridge"
      weight: 1.0
      dataset_dir: "/data/user/wsong890/user68/cjy/Motus/data/fractal/fractal_dataset"
      data_mode: "both"
      task_mode: "multi"
      task_name: null
      max_episodes: null
      image_aug: false
      use_language_action: true
      enable_setup_control_suffix: false
      setup_text: "bimanual yam robotic arms in molmoact2"
      normalize_actions: true
      stats_key: "fractal"
      state_stats_signal: "qpos"
      action_stats_signal: "epos"
      common:
        global_downsample_rate: 1

# Model configuration
model:
  wan:
    config_path: "/data/user/wsong890/user68/cjy/Motus/pretrained_models/Wan2.2-TI2V-5B"
    checkpoint_path: "/data/user/wsong890/user68/cjy/Motus/pretrained_models/Wan2.2-TI2V-5B"
    vae_path: "/data/user/wsong890/user68/cjy/Motus/pretrained_models/Wan2.2-TI2V-5B/Wan2.2_VAE.pth"
    precision: "bfloat16"

  vlm:
    checkpoint_path: "/data/user/wsong890/user68/cjy/Motus/pretrained_models/Qwen3-VL-2B-Instruct"
    precision: "bfloat16"
    frozen: false

  action_expert:
    hidden_size: 1024
    ffn_dim_multiplier: 4
    norm_eps: 1e-5

  und_expert:
    hidden_size: 512
    ffn_dim_multiplier: 4
    norm_eps: 1e-5
    vlm:
      input_dim: 2048
      projector_type: "mlp3x_silu"

  time_distribution:
    timestep_sample_method: "logit_normal"
    sigmoid_scale: 1.0
    min_t: 0.0
    max_t: 1.0

  inference:
    num_inference_timesteps: 10

  loss_weights:
    video_loss_weight: 1.0
    action_loss_weight: 1.0

  ema:
    enabled: false
    update_after_step: 0
    inv_gamma: 1.0
    power: 0.75
    min_value: 0.0
    max_value: 0.9999

# Training configuration
training:
  batch_size: 6
  max_steps: 400000
  learning_rate: 5.0e-5
  weight_decay: 0.01
  scheduler_type: "linear"
  warmup_steps: 200
  cycle_length: 5000000
  f_max: 0.99
  f_min: 0.4
  grad_clip_norm: 0.5
  use_amp: true
  find_unused_parameters: false
  train_lap: true

# System settings
system:
  checkpoint_dir: "./checkpoints"
  log_level: "INFO"
  log_interval: 1
  save_interval: 50000
  val_interval: 5000
  num_workers: 16
  pin_memory: true

# Logging settings
logging:
  report_to: "wandb"
  wandb_project: "motus"
  tensorboard_log_dir: "tensorboard_logs"
  run_name: null

# Resume training settings
resume:
  checkpoint_path: null
  reset_scheduler: false

# Finetune settings
finetune:
  checkpoint_path: /data/user/wsong890/user68/cjy/Motus/pretrained_models/Motus
